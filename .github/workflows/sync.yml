name: Sync Housecall Pro data

on:
  schedule:
    # Every 15 minutes. GitHub Actions cron can lag by a few minutes under load.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: hcp-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history, not the default shallow (fetch-depth: 1) clone.
          # `git commit --amend` on a shallow checkout doesn't see the real
          # parent commit and silently produces an orphaned (parentless)
          # commit — force-pushing that discards the entire branch history.
          # Learned this the hard way; keep this full-depth fetch.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync
        env:
          HCP_API_KEY: ${{ secrets.HCP_API_KEY }}
        run: node scripts/sync.js

      - name: Commit updated data
        run: |
          git config user.name "hcp-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi

          # The synced data file is a few MB and changes on every run. A new
          # commit each time would bloat the repo's git history fast at a
          # 15-minute cadence, so consecutive bot-only data commits are
          # collapsed into one via amend + force-push instead of stacking.
          # Any real (human) commit in between breaks the chain and gets a
          # fresh data commit on top, never amended.
          # Belt-and-suspenders: only amend if HEAD actually has a parent.
          # Amending a parentless HEAD would silently orphan the branch.
          if [ "$(git log -1 --pretty=%s)" = "Sync Housecall Pro data [skip ci]" ] && git rev-parse -q --verify HEAD^ >/dev/null; then
            git commit --amend -q -m "Sync Housecall Pro data [skip ci]"
            git push --force-with-lease origin HEAD:main
          else
            git commit -q -m "Sync Housecall Pro data [skip ci]"
            git push origin HEAD:main
          fi
