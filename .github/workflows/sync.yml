name: Sync Housecall Pro data

on:
  schedule:
    # Every 15 minutes. GitHub Actions cron can lag by a few minutes under load.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: hcp-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync
        env:
          HCP_API_KEY: ${{ secrets.HCP_API_KEY }}
        run: node scripts/sync.js

      - name: Commit updated data
        run: |
          git config user.name "hcp-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Sync Housecall Pro data [skip ci]"
            git push
          fi
