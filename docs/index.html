<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Technician Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Technician Dashboard</h1>
    <div class="topbar-meta">
      <span id="sync-status" class="sync-status">Loading...</span>
    </div>
  </header>

  <div class="filter-bar">
    <input id="search" type="search" placeholder="Filter by technician or job..." />
    <select id="business-unit-filter">
      <option value="">All business units</option>
    </select>
    <select id="tag-filter">
      <option value="">All job tags</option>
    </select>
    <select id="status-filter">
      <option value="">All statuses</option>
    </select>
  </div>

  <section id="stats" class="stats-row" aria-label="Summary metrics"></section>

  <main id="app">
    <p class="loading">Loading schedule data...</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
