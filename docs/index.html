<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Company Metrics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <img src="assets/logo-color.png" alt="Regal Inc" class="logo logo-light" />
      <img src="assets/logo-white.png" alt="Regal Inc" class="logo logo-dark" />
      <h1>Company Metrics</h1>
    </div>
    <div class="topbar-meta">
      <span id="sync-status" class="sync-status">Loading...</span>
    </div>
  </header>

  <div class="filter-bar">
    <input id="search" type="search" placeholder="Filter by technician or job..." />
    <div class="tech-select" id="tech-select">
      <button type="button" id="tech-select-toggle" class="tech-select-toggle">All technicians</button>
      <div class="tech-select-panel" id="tech-select-panel" hidden>
        <input type="search" id="tech-select-search" placeholder="Search technicians..." class="tech-select-search" />
        <div class="tech-select-actions">
          <button type="button" id="tech-select-all">Select all</button>
          <button type="button" id="tech-select-clear">Clear</button>
        </div>
        <div class="tech-select-list" id="tech-select-list"></div>
      </div>
    </div>
    <select id="business-unit-filter">
      <option value="">All business units</option>
    </select>
    <select id="tag-filter">
      <option value="">All job tags</option>
    </select>
    <select id="status-filter">
      <option value="">All statuses</option>
    </select>
    <select id="period-filter">
      <option value="">All synced time</option>
      <option value="today">Today</option>
      <option value="week">This week</option>
      <option value="lastweek">Last week</option>
      <option value="month">This month</option>
      <option value="lastmonth">Last month</option>
    </select>
  </div>

  <h2 class="section-title stats-title">Team summary</h2>
  <section id="stats" class="stats-row" aria-label="Summary metrics"></section>

  <main id="app">
    <p class="loading">Loading schedule data...</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
